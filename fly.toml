# fly.toml — hitchpedia (FastAPI + fastembed). Postgres+pgvector läuft extern (Neon, via DATABASE_URL-Secret).
app = "hitchpedia"
primary_region = "fra"   # Frankfurt (nah an DE)

[build]

[env]
  HP_BASE_URL = "https://hitchpedia.fly.dev"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1   # eine Maschine bleibt warm -> Modell heiss, erste Suche instant (kein Cold-Start)

[[vm]]
  memory = "2gb"        # nomic-Modell + onnxruntime: 1gb -> OOM-Kill (~1.4gb Peak)
  cpu_kind = "shared"
  cpus = 1
